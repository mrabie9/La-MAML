 # Non-lifelong (single-round) experiment defaults.
 #
 # This config is intended to be used together with:
 #   - configs/base.yaml               (shared experiment defaults)
 #   - configs/models/<model_name>.yaml  (model-specific overrides)
 #
 # Example:
 #   python main_single_round.py \
 #       --config configs/base.yaml \
 #       --config configs/models/rwalk.yaml \
 #       --config configs/non_ll_single_round.yaml
 #
 # This will run a non-lifelong experiment where a single combined task is
 # trained for n_epochs, with the specific tasks selected via task_order_files.

 # Give runs a distinct experiment name so logs are easy to filter.
 expt_name: test_ch-as-samples
 model: iid2

 # Number of epochs for the single-round experiment.
 # Override this per-run on the CLI if needed.
 n_epochs: 5
 samples_per_task: -1
 task_order_files: "t2-uclresm-25noise-ch-as-samples"
 data_path: data/rff/radar/uclresm_25noise_ch-as-samples

 # By default, reuse the same task ordering as base.yaml.
 # Override this in your command line or in a copy of this file to select
 # a subset of tasks for the non-LL experiment. When multiple tasks are
 # listed, they will be combined into a single effective task.
 # Example:
#  task_order_files: "t2-uclresm-25noise,t0-rcn"

